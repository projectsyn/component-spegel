apiVersion: v1
kind: Service
metadata:
  annotations:
    helm.sh/hook: post-delete
    helm.sh/hook-delete-policy: before-hook-creation, hook-succeeded
    helm.sh/hook-weight: '0'
  labels:
    app.kubernetes.io/component: cleanup
    app.kubernetes.io/instance: spegel
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: spegel
    app.kubernetes.io/version: v0.7.2
    helm.sh/chart: spegel-0.7.2
  name: spegel-cleanup
  namespace: syn-spegel
spec:
  clusterIP: None
  ports:
    - name: readiness
      port: 8080
      protocol: TCP
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/component: cleanup
    app.kubernetes.io/instance: spegel
    app.kubernetes.io/name: spegel
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  annotations:
    helm.sh/hook: post-delete
    helm.sh/hook-delete-policy: before-hook-creation, hook-succeeded
    helm.sh/hook-weight: '0'
  labels:
    app.kubernetes.io/component: cleanup
    app.kubernetes.io/instance: spegel
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: spegel
    app.kubernetes.io/version: v0.7.2
    helm.sh/chart: spegel-0.7.2
  name: spegel-cleanup
  namespace: syn-spegel
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: cleanup
      app.kubernetes.io/instance: spegel
      app.kubernetes.io/name: spegel
  template:
    metadata:
      labels:
        app.kubernetes.io/component: cleanup
        app.kubernetes.io/instance: spegel
        app.kubernetes.io/name: spegel
    spec:
      containers:
        - args:
            - cleanup
            - --containerd-registry-config-path=/etc/cri/conf.d/hosts
            - --addr=:8080
          image: ghcr.io/spegel-org/spegel@sha256:2c587a649b1b9b61d09e1e42901da5f34b2ab187247acb23086de3fad504a49c
          imagePullPolicy: IfNotPresent
          name: cleanup
          ports:
            - containerPort: 8080
              name: readiness
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /readyz
              port: readiness
          volumeMounts:
            - mountPath: /etc/cri/conf.d/hosts
              name: containerd-config
      priorityClassName: system-node-critical
      securityContext: {}
      tolerations:
        - key: CriticalAddonsOnly
          operator: Exists
        - effect: NoExecute
          operator: Exists
        - effect: NoSchedule
          operator: Exists
      volumes:
        - hostPath:
            path: /etc/cri/conf.d/hosts
            type: DirectoryOrCreate
          name: containerd-config
---
apiVersion: v1
kind: Pod
metadata:
  annotations:
    helm.sh/hook: post-delete
    helm.sh/hook-delete-policy: before-hook-creation, hook-succeeded
    helm.sh/hook-weight: '1'
  labels:
    app.kubernetes.io/component: cleanup-wait
    app.kubernetes.io/instance: spegel
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: spegel
    app.kubernetes.io/version: v0.7.2
    helm.sh/chart: spegel-0.7.2
  name: spegel-cleanup-wait
  namespace: syn-spegel
spec:
  containers:
    - args:
        - cleanup-wait
        - --probe-endpoint=spegel-cleanup.syn-spegel.svc.cluster.local.:8080
      image: ghcr.io/spegel-org/spegel@sha256:2c587a649b1b9b61d09e1e42901da5f34b2ab187247acb23086de3fad504a49c
      imagePullPolicy: IfNotPresent
      name: cleanup-wait
  restartPolicy: Never
  terminationGracePeriodSeconds: 0
