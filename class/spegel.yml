parameters:
  kapitan:
    dependencies:
      - type: helm
        source: ${spegel:charts:spegel:source}
        version: ${spegel:charts:spegel:version}
        chart_name: spegel
        output_path: ${_base_directory}/helmcharts/spegel/${spegel:charts:spegel:version}
    compile:
      - input_paths:
          - ${_base_directory}/component/app.jsonnet
        input_type: jsonnet
        output_path: .
      - input_paths:
          - ${_base_directory}/component/main.jsonnet
        input_type: jsonnet
        output_path: spegel/
      # Spegel Helm chart. Hooks are skipped: the chart ships a post-delete
      # cleanup DaemonSet which would remove the containerd mirror
      # configuration from all nodes if it were deployed as a regular
      # resource.
      - input_paths:
          - ${_base_directory}/helmcharts/spegel/${spegel:charts:spegel:version}
        input_type: helm
        helm_values: ${spegel:helm_values}
        helm_params:
          name: spegel
          namespace: ${spegel:namespace:name}
          no_hooks: true
        output_path: spegel/01_helm_chart
